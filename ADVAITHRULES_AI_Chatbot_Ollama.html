<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADVAITHRULES AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root{--bg:#09090b;--panel:#111113;--panel2:#18181b;--sidebar:#000;--accent:#00ffcc;--text:#fafafa;--muted:#a1a1aa;--border:rgba(255,255,255,.08);--danger:#ff6b6b}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Comfortaa',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
    aside{width:260px;background:var(--sidebar);border-right:1px solid var(--border);padding:20px;display:flex;flex-direction:column;gap:16px}
    .brand{font-size:1.15rem;color:var(--accent);text-shadow:0 0 12px rgba(0,255,204,.45);text-align:center;font-weight:700;margin-top:6px}
    .small{color:var(--muted);font-size:.78rem;line-height:1.5}
    .history-item{padding:12px;border-radius:12px;background:rgba(255,255,255,.03);color:var(--muted);margin-bottom:8px;font-size:.8rem}
    main{flex:1;display:flex;flex-direction:column;min-width:0}
    header{padding:14px 22px;border-bottom:1px solid var(--border);color:#7f7f85;letter-spacing:1px;font-size:.72rem;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .pill{border:1px solid var(--border);background:var(--panel);color:var(--muted);border-radius:999px;padding:8px 12px;font-size:.72rem}
    .chat{flex:1;overflow:auto;padding:28px 0 14px;scroll-behavior:smooth}
    .msg-row{width:100%;padding:18px 12%}
    .msg-content{max-width:900px;margin:0 auto;display:flex;gap:18px;align-items:flex-start}
    .ai-row{background:rgba(255,255,255,.02)}
    .avatar{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex:0 0 34px;font-size:.8rem;font-weight:700}
    .ai-avatar{background:var(--accent);color:#00120f;box-shadow:0 0 14px rgba(0,255,204,.25)}
    .user-avatar{background:#2563eb;color:white}
    .bubble{width:100%;line-height:1.7;font-size:1rem;color:var(--text);white-space:pre-wrap;word-wrap:break-word}
    .thinking{display:inline-flex;align-items:center;gap:10px;color:var(--muted)}
    .dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:5px;animation:bounce 1.2s infinite;opacity:.8}
    .dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
    @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.45}40%{transform:translateY(-6px);opacity:1}}
    .composer-wrap{border-top:1px solid var(--border);padding:16px 12%;background:linear-gradient(180deg, rgba(9,9,11,.4), rgba(9,9,11,1) 28%)}
    .config-box,.composer{max-width:900px;margin:0 auto}
    .config-box{margin-bottom:12px;background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:12px;display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
    .config-box input{width:100%;background:transparent;border:1px solid var(--border);color:var(--text);border-radius:12px;padding:11px 12px;outline:none;font-family:inherit}
    .composer{background:var(--panel2);border:1px solid var(--border);border-radius:20px;padding:12px 14px;display:flex;gap:12px;align-items:flex-end;box-shadow:0 12px 40px rgba(0,0,0,.3)}
    textarea{flex:1;min-height:26px;max-height:180px;resize:none;background:transparent;border:none;outline:none;color:var(--text);font:inherit;line-height:1.6;padding:8px 0}
    button{border:none;border-radius:12px;cursor:pointer;font-family:inherit}
    .primary{width:42px;height:42px;background:var(--accent);color:#00120f;font-size:1rem}
    .secondary{background:#222228;color:var(--text);padding:11px 14px;border:1px solid var(--border)}
    .danger{color:var(--danger);font-size:.82rem;line-height:1.5;margin-top:8px;max-width:900px;margin-left:auto;margin-right:auto}
    .ok{color:#7CFC98;font-size:.82rem;line-height:1.5;margin-top:8px;max-width:900px;margin-left:auto;margin-right:auto}
    @media (max-width:900px){aside{display:none}.msg-row{padding:16px 18px}.composer-wrap{padding:14px 18px}.config-box{grid-template-columns:1fr}header{padding:12px 16px}}
  </style>
</head>
<body>
  <aside>
    <div class="brand">ADVAITHRULES AI Chatbot</div>
    <div class="small">Free local version powered by Ollama.<br><br>Make sure Ollama is open and <b>llama3.2</b> is installed.</div>
    <div>
      <div class="history-item"><i class="fa-regular fa-message"></i> Homework help</div>
      <div class="history-item"><i class="fa-regular fa-message"></i> Math tutor</div>
      <div class="history-item"><i class="fa-regular fa-message"></i> Science questions</div>
    </div>
  </aside>

  <main>
    <header>
      <div>ADVAITHRULES AI Chatbot • llama3.2 via Ollama</div>
      <div class="top-actions">
        <div class="pill">Free local AI</div>
        <div class="pill">No API key</div>
      </div>
    </header>

    <div id="chat" class="chat"></div>

    <div class="composer-wrap">
      <div class="config-box">
        <input id="ollamaUrl" type="text" value="http://localhost:11434/api/chat" />
        <button class="secondary" id="saveUrl">Save URL</button>
      </div>

      <div class="composer">
        <textarea id="userInput" rows="1" placeholder="Ask anything..."></textarea>
        <button id="sendBtn" class="primary" title="Send">
          <i class="fa-solid fa-arrow-up"></i>
        </button>
      </div>

      <div class="danger" id="status"></div>
      <div class="ok" id="success"></div>
    </div>
  </main>

  <script>
    const MODEL = "llama3.2";
    const chat = document.getElementById("chat");
    const userInput = document.getElementById("userInput");
    const statusBox = document.getElementById("status");
    const successBox = document.getElementById("success");
    const sendBtn = document.getElementById("sendBtn");
    const urlInput = document.getElementById("ollamaUrl");
    const saveUrlBtn = document.getElementById("saveUrl");
    let history = [];
    let thinkingNode = null;

    const savedUrl = localStorage.getItem("ollama_chat_url");
    if (savedUrl) urlInput.value = savedUrl;

    appendMessage("Hi! I’m your free local chatbot. I use Ollama with llama3.2. Ask me anything.", "ai");

    function setStatus(message = "") { statusBox.textContent = message; }
    function setSuccess(message = "") { successBox.textContent = message; }
    function escapeHtml(text) { const div = document.createElement("div"); div.textContent = text; return div.innerHTML; }
    function autoGrow(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 180) + "px"; }

    userInput.addEventListener("input", () => autoGrow(userInput));
    userInput.addEventListener("keydown", async (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); await sendMessage(); }
    });
    sendBtn.addEventListener("click", sendMessage);

    saveUrlBtn.addEventListener("click", () => {
      const url = urlInput.value.trim();
      if (!url) { setStatus("Enter the Ollama URL first."); setSuccess(""); return; }
      localStorage.setItem("ollama_chat_url", url);
      setStatus(""); setSuccess("Ollama URL saved.");
    });

    function appendMessage(text, sender) {
      const row = document.createElement("div");
      row.className = `msg-row ${sender === "ai" ? "ai-row" : "user-row"}`;
      row.innerHTML = `
        <div class="msg-content">
          <div class="avatar ${sender === "ai" ? "ai-avatar" : "user-avatar"}">
            ${sender === "ai" ? '<i class="fa-solid fa-robot"></i>' : "U"}
          </div>
          <div class="bubble">${escapeHtml(text)}</div>
        </div>`;
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      return row;
    }

    function showThinking() {
      const row = document.createElement("div");
      row.className = "msg-row ai-row";
      row.innerHTML = `
        <div class="msg-content">
          <div class="avatar ai-avatar"><i class="fa-solid fa-robot"></i></div>
          <div class="bubble">
            <span class="thinking">Thinking
              <span class="dots"><span></span><span></span><span></span></span>
            </span>
          </div>
        </div>`;
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      thinkingNode = row;
    }

    function removeThinking() { if (thinkingNode) { thinkingNode.remove(); thinkingNode = null; } }

    async function sendMessage() {
      const prompt = userInput.value.trim();
      const apiUrl = urlInput.value.trim();
      if (!prompt) return;
      if (!apiUrl) { setStatus("Enter the Ollama URL first."); setSuccess(""); return; }

      appendMessage(prompt, "user");
      history.push({ role: "user", content: prompt });

      userInput.value = "";
      userInput.style.height = "auto";
      setStatus(""); setSuccess("");
      showThinking();
      sendBtn.disabled = true;

      try {
        const responseText = await callOllama(apiUrl, history);
        removeThinking();
        appendMessage(responseText, "ai");
        history.push({ role: "assistant", content: responseText });
      } catch (err) {
        removeThinking();
        appendMessage("Sorry — I ran into an error.", "ai");
        setStatus(err.message);
      } finally {
        sendBtn.disabled = false;
      }
    }

    async function callOllama(apiUrl, messages) {
      const response = await fetch(apiUrl, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: MODEL,
          messages: [
            { role: "system", content: "You are a helpful chatbot for a student. Give clear, simple answers." },
            ...messages
          ],
          stream: false
        })
      });

      if (!response.ok) throw new Error(`Ollama error: HTTP ${response.status}. Make sure Ollama is open and llama3.2 is installed.`);
      const data = await response.json();
      const text = data?.message?.content?.trim();
      if (!text) throw new Error("No text came back from Ollama.");
      return text;
    }
  </script>
</body>
</html>
